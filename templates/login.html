{% extends 'base.html' %}
{% block content %}
<div class="luxury-container" style="max-width: 450px; margin: 80px auto; text-align: center;">
    <h2 style="font-family: 'Playfair Display', serif; color: #c5a059; margin-bottom: 20px;">Connexion</h2>
    <form method="post" style="background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
        {% csrf_token %}
        <div style="text-align: left;">
            {{ form.as_p }}
        </div>
        <button type="submit" style="width: 100%; padding: 12px; background: #1a1a1a; color: #d4af37; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 15px;">
            Se connecter
        </button>
    </form>
</div>
<div style="margin-top: 25px; text-align: center;">
    <p style="color: #666; font-size: 0.9rem;">
        Vous n'avez pas de compte ? 
        <a href="{% url 'register' %}" style="color: #c5a059; font-weight: bold; text-decoration: none;">
            Créer un compte
        </a>
    </p>
</div>
{% endblock %}
