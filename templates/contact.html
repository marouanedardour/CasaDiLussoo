{% extends 'base.html' %}
{% block content %}
<style>
    .contact-wrapper { max-width: 700px; margin: 60px auto; padding: 40px; background: #fff; border: 1px solid #e0d8cf; }
    .contact-title { font-family: 'Playfair Display', serif; color: #1a1a1a; text-align: center; margin-bottom: 40px; letter-spacing: 2px; } 
    .contact-form .input-field { 
        width: 100%; padding: 15px; margin-bottom: 20px; 
        border: 1px solid #ddd; border-radius: 0; box-sizing: border-box; 
        font-family: 'Montserrat', sans-serif;
    }
    .contact-form .input-field:focus { outline: none; border-color: #b8860b; } 
    .btn-submit { 
        background: #1a1a1a; color: #d4af37; padding: 15px 40px; 
        border: none; cursor: pointer; transition: 0.3s; 
        text-transform: uppercase; letter-spacing: 2px; font-size: 0.9rem;
    }
    .btn-submit:hover { background: #b8860b; color: #fff; }
</style>
<div class="contact-wrapper">
    <h2 class="contact-title">CONTACTEZ-NOUS</h2>
    <form method="POST" class="contact-form">
        {% csrf_token %}
        <input type="text" name="name" class="input-field" placeholder="Nom complet" required>
        <input type="email" name="email" class="input-field" placeholder="Adresse Email" required>
        <input type="tel" name="phone" class="input-field" placeholder="Numéro de téléphone" required>
        <textarea name="message" class="input-field" rows="6" placeholder="Votre message..."></textarea>
        <div style="text-align: center;">
            <button type="submit" class="btn-submit">Envoyer le message</button>
        </div>
    </form>
</div>
<div style="text-align: center; margin-bottom: 60px; color: #666; font-size: 0.9rem;">
    <p>Nous sommes à votre disposition pour toute question concernant nos collections.</p>
    <p>Email: <strong>contact@casadilusso.ma</strong></p>
</div>
{% endblock %}
